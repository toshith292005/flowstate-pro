version: "3.8"

services:
  redis:
    image: redis:alpine
    restart: always

  backend:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - REDIS_URI=redis://redis:6379
    depends_on:
      - redis
    restart: always

  frontend:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - backend